default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "" } %>

development:
  <<: *default
  database: db-viveprop

test:
  <<: *default
  database: db-viveprop_test

production:
  <<: *default
  database: <%= ENV["DATABASE_NAME"] %>

dataprop_default: &dataprop_default
  adapter: postgresql
  encoding: unicode
  pool: 5
  host: <%= ENV.fetch("DATAPROP_DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATAPROP_DATABASE_PORT") { 5432 } %>
  database: <%= ENV.fetch("DATAPROP_DATABASE_NAME") { "dataprop_app_production" } %>
  username: <%= ENV.fetch("DATAPROP_DATABASE_USERNAME") { "readonly_user" } %>
  password: <%= ENV.fetch("DATAPROP_DATABASE_PASSWORD") { "" } %>

dataprop_development:
  <<: *dataprop_default

dataprop_test:
  <<: *dataprop_default

dataprop_production:
  <<: *dataprop_default
